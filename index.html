        * {

            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Excepción: Permitir escribir en el buscador */
        input[type="text"] {
            -webkit-user-select: auto;
            -khtml-user-select: auto;
            -moz-user-select: auto;
            -ms-user-select: auto;
            user-select: auto;
        }

        body { 
            background-color: #f1f5f9; 
            overflow-x: hidden;
        }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Efecto Glassmorphism */
        .glass-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.3);
        }

        /* Interacciones de Tarjetas */
        .tool-card {
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s, filter 0.3s;
        }
        .tool-card:active {
            transform: scale(0.97);
        }
        
        /* Animación de entrada fluida */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-enter {
            animation: fadeUp 0.4s ease-out forwards;
        }

        /* Animación estrella favorita */
        @keyframes starPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4) rotate(15deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        .star-pop {
            animation: starPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Efecto tarjeta Offline Rediseñado */
        .card-offline {
            background-color: #fef2f2 !important; /* Rojo ultra claro Tailwind */

        .card-offline:hover {
            box-shadow: 0 10px 20px -5px rgba(239, 68, 68, 0.15);

        .card-offline h3 {

            color: #991b1b !important;
        }

    <script>

        });
        document.addEventListener('dragstart', e => e.preventDefault());

            { id: "t27", cat: "Barreras y Aranceles", name: "Access2Markets", desc: "Calcula aranceles, impuestos y requisitos para ingresar a la Unión Europea.", tags: ["UE", "Aranceles", "Europa", "Impuestos", "Requisitos", "Normas de origen", "Duties", "Access2Markets", "Barreras", "Tributos UE", "Certificados", "ROSA", "SPS", "Fitosanitarias UE"], url: "https://trade.ec.europa.eu/", icon: "ph-file-text" },
            { id: "t28", cat: "Barreras y Aranceles", name: "USITC (DataWeb)", desc: "Sistema oficial para revisar el Arancel de EE.UU. (HTS) y estadísticas.", tags: ["HTS", "USA", "EE.UU.", "Aranceles", "Tariffs", "Aduana americana", "DataWeb", "Estados Unidos", "Partida", "HS Code USA", "Impuestos", "Cuotas", "Arancel USA", "Restricciones"], url: "https://dataweb.usitc.gov", icon: "ph-flag-banner" },
            { id: "t29", cat: "Barreras y Aranceles", name: "MACMAP", desc: "Herramienta ITC para identificar barreras arancelarias y no arancelarias.", tags: ["Barreras", "Restricciones", "ITC", "Aranceles globales", "Market access", "NTM", "Cuotas", "MACMAP", "Aduanas", "Permisos", "Sanitarias", "Fitosanitarias", "Acceso a mercado"], url: "https://www.macmap.org", icon: "ph-wall" },
            { id: "t30", cat: "Barreras y Aranceles", name: "Standards Map", desc: "Base de datos internacional de certificaciones voluntarias y normas ESG.", tags: ["Certificaciones", "ISO", "Orgánico", "Fairtrade", "ESG", "Sostenibilidad", "Normas", "Voluntarias", "Standards Map", "Sellos", "Calidad", "Comercio justo", "GAP", "HACCP", "Ecológico"], url: "https://www.standardsmap.org", icon: "ph-seal-check" },

            // 6. Fuentes Regionales
            { id: "t31", cat: "Fuentes Regionales", name: "Exportemos.pe", desc: "Inteligencia comercial elaborada por PromPerú para las Américas.", tags: ["PromPerú", "LATAM", "Perfiles", "Guías", "Américas", "Inteligencia", "Exportemos", "Seminarios", "Oportunidades", "Mercados", "Estudios", "Informes comerciales"], url: "https://exportemos.pe", icon: "ph-compass" },
            { id: "t32", cat: "Fuentes Regionales", name: "Eurostat", desc: "Base de datos macroeconómicos y sociales oficiales de la Unión Europea.", tags: ["UE", "Estadísticas", "Europa", "Macroeconomía", "EU statistics", "Eurostat", "Demografía", "Crecimiento UE", "Mercado europeo", "Indicadores europeos"], url: "https://ec.europa.eu/eurostat", icon: "ph-chart-pie-slice" },
            { id: "t33", cat: "Fuentes Regionales", name: "CBI Europe", desc: "Investigación de mercado especializada para exportar hacia Europa.", tags: ["Europa", "Tendencias", "Requisitos UE", "Oportunidades", "CBI", "Exportar a Europa", "Sostenibilidad", "Pymes", "Compradores europeos", "Guías de mercado UE"], url: "https://www.cbi.eu", icon: "ph-lightbulb" },
            { id: "t34", cat: "Fuentes Regionales", name: "US Census Bureau", desc: "Datos oficiales sobre la economía y demografía de los Estados Unidos.", tags: ["USA", "Censo", "Demografía EE.UU.", "Población", "Economía americana", "Census", "Estados Unidos", "Estados", "Consumidor USA", "Estadística Norteamérica"], url: "https://www.census.gov", icon: "ph-users" },
            { id: "t35", cat: "Fuentes Regionales", name: "PROCOMER", desc: "Promotora del Comercio Exterior de Costa Rica para Centroamérica.", tags: ["Costa Rica", "Promo", "Centroamérica", "Inteligencia", "Exportación", "PROCOMER", "TLC", "Mercado centroamericano", "Oportunidades LATAM"], url: "https://www.procomer.com", icon: "ph-megaphone" },
            { id: "t36", cat: "Fuentes Regionales", name: "ICEX España", desc: "Entidad pública que promueve la exportación en el mercado español.", tags: ["España", "Inversión", "Mercado ibérico", "Europa", "Exportación", "ICEX", "Tendencias", "Ferias en España", "Negocios internacionales"], url: "https://www.icex.es", icon: "ph-push-pin" },
            { id: "t37", cat: "Fuentes Regionales", name: "APEX Brasil", desc: "Agencia de Promoción de Exportaciones e Inversiones de Brasil.", tags: ["Brasil", "Mercado", "Sudamérica", "Inversiones", "Exportación", "APEX", "Negocios", "Mercosur", "Consumidor brasileño", "Estudios Brasil"], url: "https://www.apexbrasil.com.br", icon: "ph-star-four" }
        ];

        // ESTADO DE LA APP
        const AppState = {
            currentTab: 'all',
            activeCategory: 'Todas',
            searchQuery: '',
            favorites: JSON.parse(localStorage.getItem('adex_favs_em_v3')) || []
        };
        let isFabOpen = false;

        const CATEGORIES = ["Todas", "Nacional (Perú)", "Riesgo y Entorno", "Mercado y Estadísticas", "Logística y Tránsito", "Barreras y Aranceles", "Fuentes Regionales"];

        // INICIALIZACIÓN
        function initApp() {
            renderCategoryPills();
            updateFavBadge();
            renderGrid();

            // Listener del buscador
            const searchInput = document.getElementById('search-box');
            const clearBtn = document.getElementById('clear-search');
            
            searchInput.addEventListener('input', (e) => {
                AppState.searchQuery = e.target.value.toLowerCase().trim();
                if (AppState.searchQuery.length > 0) {
                    clearBtn.classList.remove('hidden');
                } else {
                    clearBtn.classList.add('hidden');
                }
                renderGrid();
            });
        }

        // LÓGICA DE CRÉDITOS
        function showRealName(btn) {
            btn.textContent = 'Eric Mozombite';
            btn.classList.replace('text-slate-800', 'text-adex-blue');
            btn.classList.replace('bg-slate-100', 'bg-blue-50');
            btn.classList.replace('border-slate-200', 'border-blue-200');
        }

        // LÓGICA DE LIMPIEZA DE BÚSQUEDA
        function clearSearch() {
            const input = document.getElementById('search-box');
            input.value = '';
            AppState.searchQuery = '';
            document.getElementById('clear-search').classList.add('hidden');
            renderGrid();
            input.focus();
        }

        // LÓGICA FAB (Botón Flotante)
        function toggleFab() {
            isFabOpen = !isFabOpen;
            const menu = document.getElementById('fab-menu');
            const icon = document.getElementById('fab-icon');
            
            if(isFabOpen) {
                menu.classList.remove('hidden');
                setTimeout(() => {
                    menu.classList.remove('opacity-0', 'translate-y-4');
                    menu.classList.add('opacity-100', 'translate-y-0');
                }, 10);
                icon.classList.remove('ph-list');
                icon.classList.add('ph-x', 'rotate-90');
            } else {
                menu.classList.remove('opacity-100', 'translate-y-0');
                menu.classList.add('opacity-0', 'translate-y-4');
                icon.classList.remove('ph-x', 'rotate-90');
                icon.classList.add('ph-list');
                setTimeout(() => menu.classList.add('hidden'), 300);
            }
        }

        // RENDER: Píldoras de Categoría
        function renderCategoryPills() {
            const container = document.getElementById('categories-container');
            container.innerHTML = '';
            
            CATEGORIES.forEach(cat => {
                const btn = document.createElement('button');
                btn.textContent = cat;
                const isActive = AppState.activeCategory === cat;
                
                btn.className = `whitespace-nowrap px-5 py-2 rounded-2xl text-xs font-bold transition-all duration-300 ${
                    isActive 
                    ? 'bg-adex-darkBlue text-white shadow-md transform scale-105' 
                    : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-50 hover:text-slate-800'
                }`;
                
                btn.onclick = () => {
                    if(AppState.currentTab === 'favs') switchTab('all');
                    AppState.activeCategory = cat;
                    renderCategoryPills();
                    updateHeaderTexts();
                    renderGrid();
                };
                container.appendChild(btn);
            });
        }

        function updateHeaderTexts() {
            const title = document.getElementById('section-title');
            const sub = document.getElementById('section-subtitle');
            
            if (AppState.currentTab === 'favs') {
                title.textContent = "Mis Favoritos";
                sub.textContent = "Herramientas que usas frecuentemente";
            } else {
                title.textContent = AppState.activeCategory === "Todas" ? "Directorio" : AppState.activeCategory;
                sub.textContent = "Toca cualquier ficha para abrirla";
            }
        }

        // TABS: Cambiar entre Explorar y Favoritos
        function switchTab(tab) {
            AppState.currentTab = tab;
            AppState.activeCategory = 'Todas';
            clearSearch();
            
            updateHeaderTexts();
            renderCategoryPills();
            if (isFabOpen) toggleFab(); // Cierra el menú al seleccionar
            window.scrollTo({ top: 0, behavior: 'smooth' });
            renderGrid();
        }

        // LOGICA: Guardar o quitar favorito
        function toggleStar(event, id) {
            event.preventDefault();
            event.stopPropagation(); 
            
            const btn = event.currentTarget;
            const icon = btn.querySelector('i');
            const idx = AppState.favorites.indexOf(id);

            if (idx > -1) {
                AppState.favorites.splice(idx, 1);
                icon.className = "ph-bold ph-star text-[26px] text-slate-300 transition-colors";
            } else {
                AppState.favorites.push(id);
                icon.className = "ph-fill ph-star text-[26px] text-yellow-400 drop-shadow-sm transition-colors";
                
                icon.classList.add('star-pop');
                setTimeout(() => icon.classList.remove('star-pop'), 400);
            }
            
            localStorage.setItem('adex_favs_em_v3', JSON.stringify(AppState.favorites));
            updateFavBadge();

            if (AppState.currentTab === 'favs') {
                setTimeout(renderGrid, 250);
            }
        }

        function updateFavBadge() {
            const badge = document.getElementById('fav-counter-badge');
            const total = AppState.favorites.length;
            badge.textContent = total;
            total > 0 ? badge.classList.remove('hidden') : badge.classList.add('hidden');
        }

        // RENDER: Generar el HTML de las tarjetas
        function renderGrid() {
            const grid = document.getElementById('cards-grid');
            const emptyState = document.getElementById('empty-state');
            grid.innerHTML = '';
            
            const results = toolsData.filter(tool => {
                if (AppState.currentTab === 'favs' && !AppState.favorites.includes(tool.id)) return false;
                if (AppState.currentTab === 'all' && AppState.activeCategory !== 'Todas' && tool.cat !== AppState.activeCategory) return false;
                if (AppState.searchQuery) {
                    const q = AppState.searchQuery;
                    return tool.name.toLowerCase().includes(q) || tool.desc.toLowerCase().includes(q) || tool.tags.some(t => t.toLowerCase().includes(q));
                }
                return true;
            });

            document.getElementById('counter').textContent = `${results.length} fichas`;

            if (results.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                
                if (AppState.currentTab === 'favs') {
                    document.getElementById('empty-icon').className = "ph-fill ph-star text-yellow-400";
                    document.getElementById('empty-title').textContent = "Aún no tienes favoritos";
                    document.getElementById('empty-desc').textContent = "Toca la estrella en cualquier herramienta para guardarla aquí.";
                } else {
                    document.getElementById('empty-icon').className = "ph-duotone ph-magnifying-glass text-slate-300";
                    document.getElementById('empty-title').textContent = "Sin resultados";
                    document.getElementById('empty-desc').textContent = "Intenta buscar con otra palabra clave.";
                }
                return;
            }

            grid.classList.remove('hidden');
            emptyState.classList.add('hidden');
            emptyState.classList.remove('flex');

            results.forEach((tool, i) => {
                const isFav = AppState.favorites.includes(tool.id);
                const starClass = isFav ? "ph-fill ph-star text-[26px] text-yellow-400 drop-shadow-sm" : "ph-bold ph-star text-[26px] text-slate-300";
                
                // Lógica Visual para Offline
                const isOffline = tool.isOffline || false;
                const cardBaseClass = isOffline ? 'card-offline' : 'bg-white';
                const offlineBadge = isOffline ? `
                    <div class="absolute top-4 left-4 bg-red-100 text-red-600 border border-red-200 text-[9px] font-black px-2 py-0.5 rounded-lg uppercase tracking-wider flex items-center gap-1 z-10 shadow-sm">
                        <i class="ph-bold ph-warning-circle"></i> Offline
                    </div>
                ` : '';

                // Eliminada la restricción de altura para permitir que la tarjeta crezca y muestre todos los tags
                const cardHTML = `
                    <div class="tool-card ${cardBaseClass} rounded-[1.5rem] p-5 shadow-card border border-slate-100 cursor-pointer flex flex-col h-full relative group animate-enter" 
                         style="animation-delay: ${i * 0.03}s"
                         onclick="window.open('${tool.url}', '_blank')">
                        
                        ${offlineBadge}

                        <!-- Estrella Flotante -->
                        <button class="absolute top-4 right-4 p-1 z-10" onclick="toggleStar(event, '${tool.id}')">
                            <i class="${starClass}"></i>
                        </button>

                        <!-- Cabecera Tarjeta -->
                        <div class="flex items-center gap-3 mb-4 ${isOffline ? 'mt-6' : ''}">
                            <div class="w-12 h-12 rounded-2xl bg-slate-50 border border-slate-100 flex items-center justify-center text-adex-blue group-hover:bg-adex-blue group-hover:text-white transition-colors ${isOffline ? 'icon-bg-offline' : ''}">
                                <i class="ph-duotone ${tool.icon} text-[28px]"></i>
                            </div>
                            <div class="flex-1 pr-8">
                                <span class="text-[9px] font-black uppercase tracking-widest text-slate-400 block mb-0.5">${tool.cat}</span>
                                <h3 class="text-[17px] font-black text-slate-900 leading-none">${tool.name}</h3>
                            </div>
                        </div>
                        
                        <!-- Descripción -->
                        <p class="text-[13px] text-slate-500 font-medium leading-relaxed flex-grow">${tool.desc}</p>
                        
                        <!-- Tags visibles en su totalidad (flex-wrap) -->
                        <div class="mt-4 pt-4 border-t border-slate-50 flex flex-wrap gap-1.5 h-auto">
                            ${tool.tags.map(t => `<span class="bg-slate-50 text-slate-500 text-[10px] font-bold px-2 py-1 rounded-md border border-slate-100 whitespace-nowrap ${isOffline ? 'tag-offline' : ''}">${t}</span>`).join('')}
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // Arrancar
        initApp();
    </script>
</body>
</html>
